name: 업무 일지 자동 작성

on:
  schedule:
    - cron: '40 0 * * *'  # 매일 09:40 KST (00:40 UTC)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  write-diary:
    runs-on: ubuntu-latest

    steps:
      - name: cc_edu 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 커밋 히스토리

      - name: 오늘 커밋 확인 (KST)
        id: check_commits
        run: |
          TODAY=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
          echo "TODAY=$TODAY" >> $GITHUB_ENV
          echo "오늘 날짜 (KST): $TODAY"

          COMMITS=$(git log --after="${TODAY} 00:00:00 +0900" \
                            --before="${TODAY} 23:59:59 +0900" \
                            --pretty=format:"%h %s" \
                            --no-merges)

          if [ -z "$COMMITS" ]; then
            echo "오늘 커밋 없음 - 종료"
            echo "HAS_COMMITS=false" >> $GITHUB_ENV
          else
            echo "오늘 커밋 발견:"
            echo "$COMMITS"
            echo "HAS_COMMITS=true" >> $GITHUB_ENV
            echo "COMMITS<<EOF" >> $GITHUB_ENV
            echo "$COMMITS" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: diary 레포 클론
        if: env.HAS_COMMITS == 'true'
        run: |
          git clone "https://${{ secrets.DIARY_PAT }}@github.com/jssss93/diary.git" diary_repo

      - name: 업무 일지 작성
        if: env.HAS_COMMITS == 'true'
        run: |
          YEAR=$(TZ='Asia/Seoul' date '+%Y')
          MONTH=$(TZ='Asia/Seoul' date '+%m')
          WEEK=$(TZ='Asia/Seoul' date '+%V')
          DOW=$(TZ='Asia/Seoul' date '+%A')
          TODAY=${{ env.TODAY }}

          cd diary_repo
          git config user.email "diary-bot@automation.local"
          git config user.name "Diary Bot"

          mkdir -p "${YEAR}/${MONTH}"
          FILE="${YEAR}/${MONTH}/week-${WEEK}.md"

          # 업무 일지 항목 추가
          cat >> "$FILE" << EOF

          ## ${TODAY} (${DOW})
          ### 커밋 목록
          EOF

          # 커밋 목록 추가
          cd $GITHUB_WORKSPACE
          git log --after="${TODAY} 00:00:00 +0900" \
                  --before="${TODAY} 23:59:59 +0900" \
                  --pretty=format:"- %h %s" \
                  --no-merges >> "diary_repo/$FILE"

          # 업무 요약 섹션 추가
          cat >> "diary_repo/$FILE" << EOF

          ### 업무 요약
          $(git log --after="${TODAY} 00:00:00 +0900" \
                    --before="${TODAY} 23:59:59 +0900" \
                    --pretty=format:"%s" \
                    --no-merges | tr '\n' ', ' | sed 's/,$//')

          ---
          EOF

          cat "diary_repo/$FILE"

      - name: diary 레포 커밋 및 푸시
        if: env.HAS_COMMITS == 'true'
        run: |
          YEAR=$(TZ='Asia/Seoul' date '+%Y')
          MONTH=$(TZ='Asia/Seoul' date '+%m')
          WEEK=$(TZ='Asia/Seoul' date '+%V')
          TODAY=${{ env.TODAY }}

          cd diary_repo
          git add "${YEAR}/${MONTH}/week-${WEEK}.md"
          git commit -m "📝 ${TODAY} 업무 일지 자동 기록 (cc_edu)"
          git push origin main
          echo "✅ 업무 일지 push 완료"
